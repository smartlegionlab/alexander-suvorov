name: Update Zenodo Stats

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install requests
        run: pip install requests

      - name: Fetch GitHub repos
        run: python scripts/fetch_github.py
        continue-on-error: true

      - name: Fetch Dev.to articles
        run: python scripts/fetch_devto.py
        continue-on-error: true

      - name: Fetch PyPI packages
        run: python scripts/fetch_pypi.py
        continue-on-error: true

      - name: Fetch Zenodo stats
        run: python scripts/fetch_zenodo.py
        continue-on-error: true
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Zenodo stats $(date +'%Y-%m-%d')"
          git push